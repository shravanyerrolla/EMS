<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Employee List</title>
</head>
<body>

<h2>Employee Management</h2>

<a th:href="@{/showNewEmployeeForm}">Add Employee</a>

<table border="1">
    <tr>
        <th>First Name</th>
        <th>Last Name</th>
        <th>Email</th>
        <th>Actions</th>
    </tr>

    <tr th:each="emp : ${listEmployees}">
        <td th:text="${emp.firstName}"></td>
        <td th:text="${emp.lastName}"></td>
        <td th:text="${emp.email}"></td>
        <td>
            <a th:href="@{/showFormForUpdate/{id}(id=${emp.id})}">Update</a>
            <a th:href="@{/deleteEmployee/{id}(id=${emp.id})}">Delete</a>
        </td>
    </tr>
</table>

</body>
</html>
